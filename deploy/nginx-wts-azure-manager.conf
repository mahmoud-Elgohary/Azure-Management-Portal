server {
    listen 443 ssl;
    server_name 192.168.1.115;

    ssl_certificate     /etc/ssl/certs/wts-azure-manager.crt;
    ssl_certificate_key /etc/ssl/private/wts-azure-manager.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional: redirect plain HTTP → HTTPS (uncomment if you want port 80 to redirect)
